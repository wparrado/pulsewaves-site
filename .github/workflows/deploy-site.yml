name: Deploy PulseWaves site

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    outputs:
      pages_exists: ${{ steps.check-pages.outputs.pages_exists }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Pages (with PAT)
        if: ${{ secrets.PAGES_DEPLOY_TOKEN != '' }}
        uses: actions/configure-pages@v5
        continue-on-error: true
        with:
          token: ${{ secrets.PAGES_DEPLOY_TOKEN }}
          enablement: 'true'

      - name: Setup Pages (no PAT)
        if: ${{ secrets.PAGES_DEPLOY_TOKEN == '' }}
        run: |
          echo "PAGES_DEPLOY_TOKEN not set. Skipping auto-enable of Pages."
          echo "If Pages is not enabled, enable it at: https://github.com/${{ github.repository }}/settings/pages"
        continue-on-error: true

      - name: Upload site
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./site

      - name: Check Pages site
        id: check-pages
        run: |
          repo="${GITHUB_REPOSITORY}"
          echo "Checking Pages site for $repo"
          if curl -sf -H "Authorization: Bearer ${GITHUB_TOKEN}" \
             -H "Accept: application/vnd.github.v3+json" \
             "https://api.github.com/repos/${repo}/pages" > /tmp/pages.json; then
            echo "pages_exists=true" >> $GITHUB_OUTPUT
            echo "Pages site exists"
          else
            echo "pages_exists=false" >> $GITHUB_OUTPUT
            echo "Pages site not found or not enabled"
          fi

  deploy:
    needs: build
    if: ${{ needs.build.outputs.pages_exists == 'true' || secrets.PAGES_DEPLOY_TOKEN != '' }}
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
