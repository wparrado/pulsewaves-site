const SUPPORTED = Object.keys(I18N);
function pickLang(){
  const q = new URLSearchParams(location.search).get('lang');
  if (q && I18N[q]) return q;
  const ls = localStorage.getItem('pw_lang');
  if (ls && I18N[ls]) return ls;
  const nav = (navigator.language||'es').slice(0,2).toLowerCase();
  return I18N[nav] ? nav : 'es';
}
function applyLang(lang){
  const t = I18N[lang] || I18N.es;
  document.documentElement.lang = lang;
  document.title = t.title;
  document.querySelectorAll('[data-i18n]').forEach(el=>{
    const k = el.getAttribute('data-i18n');
    if (t[k] != null) el.textContent = t[k];
  });
  document.querySelectorAll('.play-badge').forEach(img=>{ img.src = 'assets/badges/'+lang+'.png'; img.alt = t.cta2_title; });
  const sel = document.getElementById('lang'); if (sel) sel.value = lang;
  localStorage.setItem('pw_lang', lang);
}
document.getElementById('lang').addEventListener('change', e=>applyLang(e.target.value));
applyLang(pickLang());
</script>
